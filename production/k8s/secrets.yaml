# ============================================================
# NimbusFlow Customer Success FTE — Secrets
# Exercise 2.7
#
# ⚠  PLACEHOLDER FILE — DO NOT COMMIT REAL VALUES TO GIT ⚠
#
# All values must be base64-encoded before applying.
# Encode: echo -n "your-value" | base64
#
# In production, prefer an external secrets manager:
#   - AWS Secrets Manager + External Secrets Operator
#   - GCP Secret Manager + External Secrets Operator
#   - HashiCorp Vault + vault-agent-injector
#
# Apply: kubectl apply -f secrets.yaml -n customer-success-fte
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: customer-success-fte
  labels:
    app.kubernetes.io/name: customer-success-fte
    app.kubernetes.io/part-of: nimbusflow
type: Opaque
data:
  # ── PostgreSQL ──────────────────────────────────────────────
  # echo -n "your-postgres-password" | base64
  POSTGRES_PASSWORD: "UkVQTEFDRV9NRQ=="   # REPLACE_ME

  # ── Gemini AI ───────────────────────────────────────────────
  # echo -n "your-gemini-api-key" | base64
  GEMINI_API_KEY: "UkVQTEFDRV9NRQ=="      # REPLACE_ME

  # ── OpenAI (fallback / embedding) ───────────────────────────
  # echo -n "your-openai-api-key" | base64
  OPENAI_API_KEY: "UkVQTEFDRV9NRQ=="      # REPLACE_ME

  # ── Twilio ──────────────────────────────────────────────────
  # echo -n "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" | base64
  TWILIO_ACCOUNT_SID: "UkVQTEFDRV9NRQ=="  # REPLACE_ME
  # echo -n "your-twilio-auth-token" | base64
  TWILIO_AUTH_TOKEN: "UkVQTEFDRV9NRQ=="   # REPLACE_ME

---
# Gmail OAuth2 credentials and token are mounted as files
# so the GmailHandler can read them at the configured paths.
#
# Populate with the actual file contents:
#   kubectl create secret generic fte-gmail-secrets \
#     --from-file=gmail_credentials.json=secrets/gmail_credentials.json \
#     --from-file=gmail_token.json=secrets/gmail_token.json \
#     -n customer-success-fte
#
# Or patch this Secret manually:
#   CREDS=$(base64 -w0 secrets/gmail_credentials.json)
#   TOKEN=$(base64 -w0 secrets/gmail_token.json)
apiVersion: v1
kind: Secret
metadata:
  name: fte-gmail-secrets
  namespace: customer-success-fte
  labels:
    app.kubernetes.io/name: customer-success-fte
    app.kubernetes.io/part-of: nimbusflow
type: Opaque
data:
  # base64-encoded content of the Gmail OAuth2 credentials JSON file
  gmail_credentials.json: "UkVQTEFDRV9NRQ=="  # REPLACE_ME: base64(credentials.json)
  # base64-encoded content of the Gmail OAuth2 token JSON file
  gmail_token.json: "UkVQTEFDRV9NRQ=="        # REPLACE_ME: base64(token.json)
